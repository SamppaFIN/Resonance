<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Resonance</title>
<style>
  :root {
    --bg: #0a0a0f;
    --dot-color: rgba(220, 220, 240, 0.7);
    --dot-glow: rgba(180, 180, 220, 0.15);
    --text-color: rgba(200, 200, 220, 0.35);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    font-family: system-ui, -apple-system, sans-serif;
  }

  /* Entry screen container */
  #entry {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: opacity 0.6s ease;
  }

  #entry.fading {
    opacity: 0;
    pointer-events: none;
  }

  #entry.hidden {
    display: none;
  }

  /* Pulsing dot */
  .pulse-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--dot-color);
    box-shadow: 0 0 20px var(--dot-glow), 0 0 60px var(--dot-glow);
    animation: pulse 6.5s ease-in-out infinite;
    will-change: transform, opacity;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.8); opacity: 1; }
  }

  /* "touch" text */
  .touch-text {
    margin-top: 32px;
    color: var(--text-color);
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: lowercase;
    animation: textFade 6.5s ease-in-out infinite;
  }

  @keyframes textFade {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 0.5; }
  }

  /* Expansion overlay */
  #expansion {
    position: fixed;
    inset: 0;
    z-index: 5;
    pointer-events: none;
    opacity: 0;
    background: radial-gradient(circle, rgba(180,180,220,0.08) 0%, transparent 70%);
    transition: opacity 0.3s ease;
  }

  #expansion.active {
    opacity: 1;
  }

  /* Canvas layer */
  #mainCanvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: block;
  }

  /* Phase indicator (debug, hidden in production) */
  #phase {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(200,200,220,0.12);
    font-size: 10px;
    letter-spacing: 0.2em;
    z-index: 20;
    pointer-events: none;
    text-transform: uppercase;
    transition: opacity 0.8s ease;
  }
</style>
</head>
<body>

<!-- Entry screen -->
<div id="entry">
  <div class="pulse-dot" id="pulseDot"></div>
  <span class="touch-text">touch</span>
</div>

<!-- Expansion overlay for hold transition -->
<div id="expansion"></div>

<!-- Main render canvas -->
<canvas id="mainCanvas"></canvas>

<!-- Phase indicator (minimal, for debugging / subtle feedback) -->
<div id="phase"></div>

<script>
// ──────────────────────────────────────
// RESONANCE v0.1.0 — Entry Screen
// ──────────────────────────────────────

const DEBUG = true;

// ── DOM refs ──────────────────────────
const entry     = document.getElementById('entry');
const pulseDot  = document.getElementById('pulseDot');
const expansion = document.getElementById('expansion');
const canvas    = document.getElementById('mainCanvas');
const ctx       = canvas.getContext('2d');
const phaseEl   = document.getElementById('phase');

// ── State ─────────────────────────────
let state        = 'IDLE';       // IDLE | HOLDING | TRANSITIONING | GEOMETRIC
let holdTimer    = null;
let holdStart    = 0;
let holdActive   = false;
let holdCancelled = false;
const HOLD_MS    = 800;          // Hold threshold
const TRANSITION_MS = 1200;      // Transition animation duration

let transitionStart = 0;
let transitionProgress = 0;

// ── Audio ─────────────────────────────
let audioCtx = null;

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (DEBUG) console.log('[Audio] Context created, state:', audioCtx.state);
  } catch (e) {
    console.warn('[Audio] Could not create AudioContext:', e);
  }
}

// ── SID Engine: C64-style 3-channel synthesizer ──
// Classical melodies adapted for Commodore 64 SID chip emulation
// Channels: 1=Triangle (lead), 2=Sawtooth (fill), 3=Pulse (accent) + PWM

// ── Note frequency table (A4 = 440 Hz) ──
const NOTE_F = {
  C2:65.41,  D2:73.42,  Eb2:77.78, E2:82.41,  F2:87.31,  Gb2:92.50, Fs2:92.50, G2:98.00,  Ab2:103.83, A2:110.00, Bb2:116.54, As2:116.54, B2:123.47,
  C3:130.81, D3:146.83, Eb3:155.56, E3:164.81, F3:174.61, Gb3:185.00, Fs3:185.00, G3:196.00, Ab3:207.65, A3:220.00, Bb3:233.08, As3:233.08, B3:246.94,
  C4:261.63, D4:293.66, Eb4:311.13, E4:329.63, F4:349.23, Gb4:369.99, Fs4:369.99, G4:392.00, Ab4:415.30, A4:440.00, Bb4:466.16, As4:466.16, B4:493.88,
  Cs4:277.18, Cs5:554.37,
  C5:523.25, D5:587.33, E5:659.25, F5:698.46, G5:783.99, A5:880.00,
  REST:0
};

// ── Level-based classical melody fragments ──
// Each level has its own 3-channel melodies per state
// Level 1: Sibelius — Finlandia (hymn theme)
// Level 2: Grieg — In the Hall of the Mountain King (Peer Gynt)
// Levels 3+: default classical set (Beethoven, Bach, Satie)

const LEVEL_MELODIES = {
  // ═══ Level 1: Finlandia (Sibelius) ═══
  1: {
    CHAOS: { // brooding opening, tense brass motif
      ch1: ['B2','D3','B2','G2', 'A2','C3','A2','Fs2'],
      ch2: ['G1','G1','G1','G1', 'D2','D2','D2','D2'],
      ch3: ['D3','Fs3','D3','B2', 'C3','E3','C3','A2']
    },
    PATTERN: { // hymn begins to emerge, still tentative
      ch1: ['G3','G3','Fs3','G3', 'A3','G3','Fs3','E3'],
      ch2: ['G2','G2','D3','G3', 'D3','G2','D3','G3'],
      ch3: ['B3','D4','A3','B3', 'C4','B3','A3','G3']
    },
    STABLE: { // full Finlandia hymn — majestic, calm strength
      ch1: ['G4','G4','Fs4','G4','A4', 'G4','Fs4','E4','D4', 'E4','Fs4','G4','A4','B4', 'A4','G4','Fs4','G4'],
      ch2: ['G2','D3','G3','D3','G3', 'C3','G3','C3','G3', 'G2','D3','G3','D3','G3', 'D3','G3','D3','G2'],
      ch3: ['B3','B3','A3','B3','C4', 'B3','A3','G3','Fs3', 'G3','A3','B3','C4','D4', 'C4','B3','A3','B3']
    },
    RESONANCE: { // hymn climax — triumphant, full chords
      ch1: ['G4','A4','B4','C5','B4', 'A4','G4','Fs4','G4', 'G4','A4','B4','C5','D5', 'C5','B4','A4','G4'],
      ch2: ['G2','G2','G2','G2','G2', 'C3','C3','C3','C3', 'G2','G2','D3','D3','D3', 'G3','G3','D3','G2'],
      ch3: ['B3','C4','D4','E4','D4', 'C4','B3','A3','B3', 'B3','C4','D4','E4','Fs4', 'E4','D4','C4','B3']
    }
  },
  // ═══ Level 2: Mountain King (Grieg) ═══
  2: {
    CHAOS: { // slow, ominous — the troll awakens
      ch1: ['B2','B2','As2','B2','Cs3', 'B2','As2','B2','Cs3','D3'],
      ch2: ['B1','B1','B1','B1','B1', 'Fs1','Fs1','Fs1','Fs1','Fs1'],
      ch3: ['D3','D3','Cs3','D3','E3', 'D3','Cs3','D3','E3','Fs3']
    },
    PATTERN: { // pace quickens — trolls begin to stir
      ch1: ['B3','B3','As3','B3','Cs4', 'B3','As3','B3','Cs4','D4', 'B3','B3','As3','B3','Cs4', 'B3','As3','Fs3'],
      ch2: ['B2','Fs2','B2','Fs2','B2', 'Fs2','Cs3','Fs2','Cs3','Fs2', 'B2','Fs2','B2','Fs2','B2', 'Fs2','Cs3','Fs2'],
      ch3: ['D4','D4','Cs4','D4','E4', 'D4','Cs4','D4','E4','Fs4', 'D4','D4','Cs4','D4','E4', 'D4','Cs4','A3']
    },
    STABLE: { // full chase — relentless, driving
      ch1: ['B3','B3','As3','B3','Cs4', 'B3','As3','B3','Cs4','D4', 'B3','B3','As3','B3','Cs4', 'B3','As3','Fs3','B3','B3'],
      ch2: ['B2','Fs2','B2','Fs2','B2', 'Fs2','Cs3','Fs2','Cs3','Fs2', 'B2','Fs2','B2','Fs2','B2', 'Fs2','Cs3','Fs2','Cs3','Fs2'],
      ch3: ['D4','D4','Cs4','D4','E4', 'D4','Cs4','D4','E4','Fs4', 'D4','D4','Cs4','D4','E4', 'D4','Cs4','A3','D4','D4']
    },
    RESONANCE: { // crash + silence — king's hall collapses
      ch1: ['B4','B4','As4','B4','Cs5', 'D5','Cs5','B4','As4','B4', 'REST','REST','REST','REST', 'REST','REST'],
      ch2: ['B2','B2','B2','B2','B2', 'Fs2','Fs2','Fs2','Fs2','Fs2', 'B2','B2','B2','REST', 'REST','REST'],
      ch3: ['D4','D4','Cs4','D4','E4', 'Fs4','E4','D4','Cs4','D4', 'REST','REST','REST','REST', 'REST','REST']
    }
  }
};

// ── Default melodies (Level 3+): Beethoven, Bach, Satie ──
const MEL_CHAOS_CH1   = ['G3','G3','G3','Eb3', 'F3','F3','F3','D3'];
const MEL_CHAOS_CH2   = ['G2','G2','G2','G2',  'F2','F2','F2','F2'];
const MEL_CHAOS_CH3   = ['G4','Eb4','G4','Eb4', 'F4','D4','F4','D4'];

const MEL_PATTERN_CH1 = ['C3','E3','G3','C4', 'E4','C4','G3','E3'];
const MEL_PATTERN_CH2 = ['C2','C3','G2','G3', 'A2','A3','F2','F3'];
const MEL_PATTERN_CH3 = ['E4','C4','G3','E3', 'C4','G3','E3','C3'];

const MEL_STABLE_CH1  = ['G3','A3','B3','A3', 'G3','Gb3','E3','D3'];
const MEL_STABLE_CH2  = ['G2','D3','A2','E3', 'B2','Gb3','D3','G2'];
const MEL_STABLE_CH3  = ['B3','A3','G3','Gb3', 'E3','D3','E3','Gb3'];

const MEL_RES_CH1     = ['E4','E4','F4','G4', 'G4','F4','E4','D4', 'C4','C4','D4','E4', 'E4','D4','D4','REST'];
const MEL_RES_CH2     = ['C3','G3','C3','G3', 'C3','G3','C3','G3', 'C3','G3','C3','G3', 'C3','G3','C3','G3'];
const MEL_RES_CH3     = ['C4','E4','G4','C5', 'G4','E4','C4','G3', 'E4','C4','G3','E3', 'C4','G3','E3','C3'];

// ── Melody lookup (level-aware) ──
function getMelodyArray(ch, st, lvl) {
  const set = LEVEL_MELODIES[lvl];
  if (set && set[st]) {
    return set[st]['ch' + ch] || ['REST'];
  }
  // Fallback: default classical set for levels 3+
  if (st === GeoState.CHAOS)     return ch === 1 ? MEL_CHAOS_CH1   : ch === 2 ? MEL_CHAOS_CH2   : MEL_CHAOS_CH3;
  if (st === GeoState.PATTERN)   return ch === 1 ? MEL_PATTERN_CH1 : ch === 2 ? MEL_PATTERN_CH2 : MEL_PATTERN_CH3;
  if (st === GeoState.STABLE)    return ch === 1 ? MEL_STABLE_CH1  : ch === 2 ? MEL_STABLE_CH2  : MEL_STABLE_CH3;
  if (st === GeoState.RESONANCE) return ch === 1 ? MEL_RES_CH1     : ch === 2 ? MEL_RES_CH2     : MEL_RES_CH3;
  return ['REST'];
}

function getNoteMs(st) {
  if (st === GeoState.CHAOS)     return 140;  // frantic 16th
  if (st === GeoState.PATTERN)   return 200;  // steady 8th
  if (st === GeoState.STABLE)    return 300;  // calm quarter
  if (st === GeoState.RESONANCE) return 420;  // majestic
  return 500;
}

// ── SID Engine state ──
let sidNodes = null; // { ch1_osc,ch1_gain,ch1_filt,ch1_clip, ch2_..., ch3_..., master, lfo, lfoGain }
let sidStep      = { ch1:0, ch2:0, ch3:0 };
let sidNextMs    = 0;
let sidLastState = null;

function initAudioEngine() {
  if (!audioCtx) return;
  if (sidNodes) return;

  if (audioCtx.state === 'suspended') audioCtx.resume();

  // ── Master dynamics compressor (SID-style glue + warmth) ──
  const master = audioCtx.createDynamicsCompressor();
  master.threshold.setValueAtTime(-28, audioCtx.currentTime);
  master.knee.setValueAtTime(12, audioCtx.currentTime);
  master.ratio.setValueAtTime(5, audioCtx.currentTime);
  master.attack.setValueAtTime(0.003, audioCtx.currentTime);
  master.release.setValueAtTime(0.1, audioCtx.currentTime);
  master.connect(audioCtx.destination);

  // ── Channel factory: osc → filter → wave-shaper (soft-clip) → gain → master ──
  function makeChannel(type, filtHz, q) {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filt = audioCtx.createBiquadFilter();
    const clip = audioCtx.createWaveShaper();

    osc.type = type;
    osc.frequency.value = 220;
    gain.gain.value = 0;

    filt.type = 'lowpass';
    filt.frequency.value = filtHz;
    filt.Q.value = q;

    // Soft-clip curve: tanh approximation for SID analog warmth
    const n = 256;
    const curve = new Float32Array(n);
    for (let i = 0; i < n; i++) {
      const x = (i - n / 2) / (n / 4); // range -2..2
      curve[i] = Math.tanh(x) * 0.85;
    }
    clip.curve = curve;

    osc.connect(filt);
    filt.connect(clip);
    clip.connect(gain);
    gain.connect(master);
    osc.start();

    return { osc, gain, filt, clip };
  }

  const ch1 = makeChannel('triangle', 1800, 1.2); // lead: soft, filtered
  const ch2 = makeChannel('sawtooth', 1400, 0.9); // fill: rich, gritty
  const ch3 = makeChannel('square',    2200, 0.7); // accent: hollow, bright (pulse=PWM via LFO)

  // ── LFO for PWM (pulse width modulation) on Channel 3 ──
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  lfo.type = 'sine';
  lfo.frequency.value = 1.5; // Hz — slow PWM sweep
  lfoGain.gain.value = 18;   // modulation depth (cents)
  lfo.connect(lfoGain);
  lfoGain.connect(ch3.osc.detune); // detune wobble ~= pulse width shift
  lfo.start();

  sidNodes = {
    ch1_osc:ch1.osc, ch1_gain:ch1.gain, ch1_filt:ch1.filt, ch1_clip:ch1.clip,
    ch2_osc:ch2.osc, ch2_gain:ch2.gain, ch2_filt:ch2.filt, ch2_clip:ch2.clip,
    ch3_osc:ch3.osc, ch3_gain:ch3.gain, ch3_filt:ch3.filt, ch3_clip:ch3.clip,
    master, lfo, lfoGain
  };

  if (DEBUG) console.log('[SID] Engine initialized — C64 3ch synth + classical melodies');
}

// ── ADSR note trigger (C64 style: fast attack, decay to sustain) ──
function sidNoteOn(ch, freq, velocity, now) {
  const s = sidNodes;
  if (!s) return;
  const osc  = ch === 1 ? s.ch1_osc  : ch === 2 ? s.ch2_osc  : s.ch3_osc;
  const gain = ch === 1 ? s.ch1_gain : ch === 2 ? s.ch2_gain : s.ch3_gain;

  if (freq > 0) {
    osc.frequency.setTargetAtTime(freq, now, 0.003); // fast portamento slide
  }
  // ADSR: A=3ms → D=60ms → S=65% (release on next note)
  gain.gain.cancelScheduledValues(now);
  gain.gain.setValueAtTime(gain.gain.value || 0, now);
  gain.gain.linearRampToValueAtTime(velocity,        now + 0.003); // Attack
  gain.gain.setTargetAtTime(velocity * 0.35,         now + 0.008, 0.04); // Decay → Sustain
}

function sidNoteOff(ch, now) {
  const s = sidNodes;
  if (!s) return;
  const gain = ch === 1 ? s.ch1_gain : ch === 2 ? s.ch2_gain : s.ch3_gain;
  gain.gain.setTargetAtTime(0, now + 0.002, 0.025); // Release: quick fade
}

// ── Main audio update — called every frame from render loop ──
function updateAudioEngine() {
  if (!sidNodes || !audioCtx) return;
  const now = audioCtx.currentTime;
  const st = geoState;

  // State change → reset sequencer
  if (st !== sidLastState) {
    sidStep.ch1 = 0; sidStep.ch2 = 0; sidStep.ch3 = 0;
    sidNextMs = 0;
    sidLastState = st;
  }

  const droneOn = gActiveTouchCount > 0 || gInputType !== null || st === GeoState.RESONANCE;
  if (!droneOn && st !== GeoState.RESONANCE) {
    // No input: fade all channels
    if (sidNodes.ch1_gain.gain.value > 0.001) sidNodes.ch1_gain.gain.setTargetAtTime(0, now, 0.08);
    if (sidNodes.ch2_gain.gain.value > 0.001) sidNodes.ch2_gain.gain.setTargetAtTime(0, now, 0.08);
    if (sidNodes.ch3_gain.gain.value > 0.001) sidNodes.ch3_gain.gain.setTargetAtTime(0, now, 0.08);
    return;
  }

  const noteMs = getNoteMs(st);
  const audioNow = audioCtx.currentTime * 1000; // ms for sequencer clock

  if (audioNow >= sidNextMs) {
    // Slight human feel (±15% timing variation)
    sidNextMs = audioNow + noteMs * (0.85 + Math.random() * 0.3);

    // ── Per-state detune, velocity & filter settings ──
    let d1 = 0, d2 = 0, d3 = 0;         // detune (cents)
    let fc1 = 1800, fc2 = 1400, fc3 = 2200; // filter cutoff (Hz)
    let v1 = 0.007, v2 = 0.006, v3 = 0.004;  // velocity — very quiet

    if (st === GeoState.CHAOS) {
      d1 = (Math.random() - 0.5) * 40; d2 = (Math.random() - 0.5) * 50; d3 = (Math.random() - 0.5) * 30;
      v1 = 0.008; v2 = 0.007; v3 = 0.005;
    } else if (st === GeoState.PATTERN) {
      d1 = (Math.random() - 0.5) * 15; d2 = (Math.random() - 0.5) * 20;
      v1 = 0.008; v2 = 0.007;
    } else if (st === GeoState.STABLE) {
      // Pure, no detune
      v1 = 0.006; v2 = 0.005; v3 = 0.004;
      if (sidNodes.lfo) sidNodes.lfo.frequency.setTargetAtTime(1.5, now, 0.1); // slow PWM
    } else if (st === GeoState.RESONANCE) {
      v1 = 0.010; v2 = 0.008; v3 = 0.007;
      // Filter sweep: gradually open (800 → 6000 Hz)
      const rp = Math.min(1, (performance.now() - geoStateMs) / 3000);
      const sw = 800 + rp * 5200;
      fc1 = sw; fc2 = sw * 0.8; fc3 = sw * 1.1;
      if (sidNodes.lfo) sidNodes.lfo.frequency.setTargetAtTime(3.0, now, 0.15); // fast sparkle
    }

    // Apply filter cutoffs
    sidNodes.ch1_filt.frequency.setTargetAtTime(fc1, now, 0.08);
    sidNodes.ch2_filt.frequency.setTargetAtTime(fc2, now, 0.08);
    sidNodes.ch3_filt.frequency.setTargetAtTime(fc3, now, 0.08);

    // ── Play next note on each channel ──
    function playStep(chNum, vel) {
      const mel = getMelodyArray(chNum, st, currentLevel);
      if (!mel || mel.length === 0) return;
      const idx = sidStep['ch' + chNum] % mel.length;
      const freq = NOTE_F[mel[idx]] || 0;
      if (freq > 0) {
        sidNoteOn(chNum, freq, vel, now);
      } else {
        sidNoteOff(chNum, now); // REST note
      }
      sidStep['ch' + chNum] = (idx + 1) % mel.length;
    }

    playStep(1, v1);
    playStep(2, v2);
    playStep(3, v3);

    // Apply detune
    sidNodes.ch1_osc.detune.setTargetAtTime(d1, now, 0.05);
    sidNodes.ch2_osc.detune.setTargetAtTime(d2, now, 0.05);
    sidNodes.ch3_osc.detune.setTargetAtTime(d3, now, 0.05);
  }
}

// ── Shutdown: fade all channels to silence ──
function shutdownAudioEngine() {
  if (!sidNodes) return;
  const now = audioCtx.currentTime;
  sidNodes.ch1_gain.gain.setTargetAtTime(0, now, 0.15);
  sidNodes.ch2_gain.gain.setTargetAtTime(0, now, 0.15);
  sidNodes.ch3_gain.gain.setTargetAtTime(0, now, 0.15);
  if (DEBUG) console.log('[SID] Shutdown — fade to silence');
}

// Visibility change: resume audio on return (phone call etc.)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume();
    if (DEBUG) console.log('[Audio] Context resumed (visibility change)');
  }
});

// ── Canvas setup ──────────────────────
function resizeCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width  = window.innerWidth  * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width  = window.innerWidth  + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
}

window.addEventListener('resize', () => {
  resizeCanvas();
  if (state === 'GEOMETRIC') {
    // Recenter geometry on resize
    geoCx = window.innerWidth / 2;
    geoCY = window.innerHeight / 2;
  }
});
resizeCanvas();

// ── Phase indicator (subtle) ──────────
function setPhase(text) {
  phaseEl.textContent = text;
  if (text) {
    phaseEl.style.opacity = '1';
  } else {
    phaseEl.style.opacity = '0';
  }
}

// ── Hold detection ────────────────────
let holdStartX = 0;
let holdStartY = 0;

function onTouchStart(e) {
  if (state === 'TRANSITIONING') return;
  if (state === 'GEOMETRIC') return; // handled by geometric phase later

  // Init audio on first touch (browser policy)
  initAudio();

  e.preventDefault();
  const t = e.touches[0];
  holdStart = performance.now();
  holdStartX = t.clientX;
  holdStartY = t.clientY;
  holdActive = true;
  holdCancelled = false;

  // Start hold timer
  clearTimeout(holdTimer);
  holdTimer = setTimeout(() => {
    if (!holdActive || holdCancelled) return;
    startTransition();
  }, HOLD_MS);

  if (DEBUG) console.log('[Input] touchstart — hold timer started');
}

function onTouchMove(e) {
  if (!holdActive) return;
  e.preventDefault();

  // Cancel hold if finger moves more than 10px
  if (e.touches.length === 1) {
    const t = e.touches[0];
    const dx = t.clientX - holdStartX;
    const dy = t.clientY - holdStartY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 10) {
      holdCancelled = true;
      clearTimeout(holdTimer);
      if (DEBUG) console.log('[Input] touchmove — hold cancelled (moved', Math.round(dist), 'px)');
    }
  }
}

function onTouchEnd(e) {
  if (!holdActive) return;
  e.preventDefault();

  holdActive = false;
  clearTimeout(holdTimer);

  const held = performance.now() - holdStart;
  if (DEBUG) console.log('[Input] touchend — held', Math.round(held), 'ms');
}

function onTouchCancel(e) {
  holdActive = false;
  holdCancelled = true;
  clearTimeout(holdTimer);
}

// ── Transition: Entry → Geometric ─────
function startTransition() {
  state = 'TRANSITIONING';
  holdActive = false;
  transitionStart = performance.now();

  // Stop CSS pulse, snap dot to full opacity
  pulseDot.style.animation = 'none';
  pulseDot.style.transform = 'scale(1)';
  pulseDot.style.opacity = '1';

  // Activate expansion overlay
  expansion.classList.add('active');

  if (DEBUG) console.log('[Transition] Starting — entry → geometric');

  setPhase('');

  requestAnimationFrame(animateTransition);
}

function animateTransition(now) {
  if (state !== 'TRANSITIONING') return;

  const elapsed = now - transitionStart;
  transitionProgress = Math.min(elapsed / TRANSITION_MS, 1);

  // Ease out cubic for smooth end
  const t = 1 - Math.pow(1 - transitionProgress, 3);

  // Scale the dot up
  const scale = 1 + t * 300; // eventually fills viewport
  pulseDot.style.transform = `scale(${scale})`;

  // Fade entry elements
  entry.style.opacity = 1 - t * t; // fade out faster near end

  // Draw expansion on canvas too (radial fill)
  drawExpansion(t);

  if (transitionProgress < 1) {
    requestAnimationFrame(animateTransition);
  } else {
    finishTransition();
  }
}

function drawExpansion(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // Subtle radial gradient that grows
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const maxRadius = Math.max(window.innerWidth, window.innerHeight) * 0.8;
  const radius = t * maxRadius;

  if (radius > 0) {
    const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    gradient.addColorStop(0, `rgba(180,180,220,${0.05 * t})`);
    gradient.addColorStop(1, 'rgba(10,10,15,0)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
  }
}

function finishTransition() {
  // Hide entry screen completely
  entry.classList.add('hidden');
  expansion.classList.remove('active');

  // Enter geometric phase (placeholder until Vaihe 3)
  enterGeometricPhase();
}

// ── Constants ─────────────────────────
const GeoState = {
  IDLE:        'IDLE',
  CHAOS:       'CHAOS',
  PATTERN:     'PATTERN',
  STABLE:      'STABLE',
  RESONANCE:   'RESONANCE',
  TRANSITION:  'TRANSITION'
};

const TAP_MAX_MS    = 250;    // max tap duration
const TAP_MAX_DIST  = 12;     // max tap movement px
const BREAK_MS      = 800;    // gap > this = break
const RHYTHM_WINDOW = 5;      // last N taps for rhythm calc
const INACTIVITY_MS = 10000;  // CHAOS → IDLE timeout
const N1_STABLE_MS  = 2000;   // input type stable for N1
const N2_ZERO_BREAK_MS = 5000; // break_count == 0 for N2
const RHYTHM_THRESH = 0.3;    // rhythm_score < this = good
const FLOW_THRESH   = 0.2;    // flow_score < this = smooth
const FORCE_LIMIT   = 0.5;    // force_score < this = not forcing
const STABLE_TIME_MS = 3000;  // PATTERN → STABLE after this long with no breaks

// ── Level system ──────────────────────
let currentLevel = 1;
const LEVEL_COUNT = 4;

const LevelGeom = {
  // Returns { sides, nodeCount, rotationSpeed, name }
  config: function(level) {
    switch (level) {
      case 1: return { sides: 3, nodeCount: 3, rotationSpeed: 0, name: 'Triangle' };
      case 2: return { sides: 6, nodeCount: 6, rotationSpeed: 0, name: 'Hexagon' };
      case 3: return { sides: 12, nodeCount: 12, rotationSpeed: 0.0003, name: 'Moving Star' };
      case 4: return { sides: 1, nodeCount: 1, rotationSpeed: 0, name: 'Void' };
      default: return { sides: 3, nodeCount: 3, rotationSpeed: 0, name: 'Unknown' };
    }
  }
};

// ── Geometry ──────────────────────────
let geoCx = window.innerWidth / 2;
let geoCY = window.innerHeight / 2;
let geoSize = Math.min(window.innerWidth, window.innerHeight) * 0.2;
let geoRotation = 0;          // current rotation (for L3 moving star)

function getGeometryPoints() {
  const cfg = LevelGeom.config(currentLevel);
  const pts = [];
  const cx = geoCx;
  const cy = geoCY;
  const size = geoSize;
  const rot = geoRotation;

  if (cfg.sides === 1) {
    // Level 4: Void — single point
    pts.push({ x: cx, y: cy });
  } else {
    const startAngle = -Math.PI / 2 + rot;
    for (let i = 0; i < cfg.sides; i++) {
      const angle = startAngle + (Math.PI * 2 * i) / cfg.sides;
      pts.push({
        x: cx + Math.cos(angle) * size,
        y: cy + Math.sin(angle) * size
      });
    }
  }
  return { pts, cfg };
}

// ── Geo state ─────────────────────────
let geoState    = GeoState.IDLE;
let geoStateMs  = 0;       // time in current state

// ── Touch state (multi-touch) ─────────
// Track all active touches by identifier
let gTouches = {};          // touchId → { startX, startY, startMs, curX, curY, moved, lastDragX, lastDragY, lastDragMs }
let gActiveTouchCount = 0;
let gLastTapMs     = 0;
let gLastDragMs   = 0;
let gInputType    = null;   // 'tap' | 'hold' | 'drag' | null

function getTouchData(id) {
  if (!gTouches[id]) {
    gTouches[id] = {
      startX: 0, startY: 0, startMs: 0,
      curX: 0, curY: 0, moved: false,
      lastDragX: 0, lastDragY: 0, lastDragMs: 0
    };
  }
  return gTouches[id];
}

function removeTouch(id) {
  delete gTouches[id];
  gActiveTouchCount = Object.keys(gTouches).length;
}

  ],

let tasksDone = { tap: false, drag_1: false, drag_2: false, drag_3: false, drag_4: false, circle: false, gentle: false };
let maxFingers = 0;        // max simultaneous touches in current session
let hadCircle  = false;    // detected circular motion
let circleAngles = [];     // last N drag angles for circle detection

function resetTasks() {
  for (let k in tasksDone) tasksDone[k] = false;
  maxFingers = 0; hadCircle = false; circleAngles = [];
}

function checkTaskTap() {
  if (tapTimes.length >= 5 && rhythmScore < 0.3) { tasksDone.tap = true; if (DEBUG) console.log('[Task] tap DONE — rhythm:', rhythmScore.toFixed(3), 'taps:', tapTimes.length); }
}

function checkTaskGentle() {
  if (forceScore < 0.5 && rhythmScore < 0.3) { tasksDone.gentle = true; if (DEBUG) console.log('[Task] gentle DONE — force:', forceScore.toFixed(3), 'rhythm:', rhythmScore.toFixed(3)); }
}

function checkTaskDrag(fingers) {
  if (fingers >= 1 && dragSpeeds.length >= 5 && flowScore < 0.3) { tasksDone.drag_1 = true; if (DEBUG) console.log('[Task] drag_1 DONE — flow:', flowScore.toFixed(3), 'speeds:', dragSpeeds.length); }
  if (fingers >= 2 && dragSpeeds.length >= 5 && flowScore < 0.3) tasksDone.drag_2 = true;
  if (fingers >= 3 && dragSpeeds.length >= 5 && flowScore < 0.4) tasksDone.drag_3 = true;
  if (fingers >= 4 && dragSpeeds.length >= 5 && flowScore < 0.5) tasksDone.drag_4 = true;
}

function checkTaskCircle() {
  if (!hadCircle && circleAngles.length >= 8) {
    // Check if angles cover at least 270° in one direction
    let sum = 0;
    for (let i = 1; i < circleAngles.length; i++) {
      let diff = circleAngles[i] - circleAngles[i - 1];
      if (diff > Math.PI) diff -= Math.PI * 2;
      if (diff < -Math.PI) diff += Math.PI * 2;
      sum += diff;
    }
    if (Math.abs(sum) > Math.PI * 1.5) hadCircle = true;
  }
  tasksDone.circle = hadCircle;
}

function currentTasks() {
  return LEVEL_TASKS[currentLevel] || LEVEL_TASKS[1];
}

function allTasksDone() {
  return currentTasks().every(t => tasksDone[t.id]);
}

// ── Rhythm guide ─────────────────────
const BPM = 108;               // 432/4 = 108 BPM — grounding rhythm
const BEAT_MS = 60000 / BPM;   // ~555ms
let beatPhase = 0;             // 0-1 within each beat
let lastBeatMs = 0;
let tapSyncScore = 0;          // 0-1: how well user matches the beat
const TAP_SYNC_WINDOW = 12;    // recent taps to evaluate sync

function updateRhythmGuide(now) {
  // Advance beat phase continuously
  if (!lastBeatMs) lastBeatMs = now;
  const beatElapsed = now - lastBeatMs;
  beatPhase = (beatElapsed % BEAT_MS) / BEAT_MS;

  // Evaluate sync from recent taps
  if (tapTimes.length >= 2) {
    const recent = tapTimes.slice(-TAP_SYNC_WINDOW);
    let syncSum = 0;
    for (let i = 1; i < recent.length; i++) {
      const interval = recent[i] - recent[i - 1];
      // How close to BEAT_MS? 1 = perfect, 0 = way off
      const ratio = interval / BEAT_MS;
      syncSum += Math.max(0, 1 - Math.abs(1 - ratio) * 3);
    }
    tapSyncScore = syncSum / (recent.length - 1);
  }
}

function drawRhythmGuide() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const pulseRadius = geoSize + 16 + Math.sin(beatPhase * Math.PI * 2) * 4;

  // Pulsing ring — target beat visual
  const beatAlpha = 0.08 + 0.08 * Math.sin(beatPhase * Math.PI);
  ctx.strokeStyle = `rgba(200,200,255,${beatAlpha})`;
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.arc(cx, cy, pulseRadius, 0, Math.PI * 2);
  ctx.stroke();

  // Sync indicator: green glow when in sync
  if (tapSyncScore > 0.5) {
    const syncAlpha = tapSyncScore * 0.04;
    const glow = ctx.createRadialGradient(cx, cy, pulseRadius - 2, cx, cy, pulseRadius + 6);
    glow.addColorStop(0, `rgba(100,255,150,${syncAlpha})`);
    glow.addColorStop(1, 'rgba(100,255,150,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(cx, cy, pulseRadius + 6, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ── Rendering ─────────────────────────
let geoAnimFrame = null;
let nodeGlowPhase = 0;

function bindGeoEvents() {
  canvas.addEventListener('touchstart',  geoOnTouchStart,  { passive: false });
  canvas.addEventListener('touchmove',   geoOnTouchMove,   { passive: false });
  canvas.addEventListener('touchend',    geoOnTouchEnd,    { passive: false });
  canvas.addEventListener('touchcancel', geoOnTouchCancel, { passive: false });

  canvas.addEventListener('mousedown', geoOnMouseDown);
  window.addEventListener('mousemove', geoOnMouseMove);
  window.addEventListener('mouseup',   geoOnMouseUp);
}

function unbindGeoEvents() {
  canvas.removeEventListener('touchstart',  geoOnTouchStart);
  canvas.removeEventListener('touchmove',   geoOnTouchMove);
  canvas.removeEventListener('touchend',    geoOnTouchEnd);
  canvas.removeEventListener('touchcancel', geoOnTouchCancel);

  canvas.removeEventListener('mousedown', geoOnMouseDown);
  window.removeEventListener('mousemove', geoOnMouseMove);
  window.removeEventListener('mouseup',   geoOnMouseUp);
}

// ── Touch handlers ────────────────────
function geoOnTouchStart(e) {
  if (state !== 'GEOMETRIC') return;
  e.preventDefault();

  for (let i = 0; i < e.touches.length; i++) {
    const t = e.touches[i];
    const td = getTouchData(t.identifier);
    td.startX = t.clientX;
    td.startY = t.clientY;
    td.curX   = t.clientX;
    td.curY   = t.clientY;
    td.startMs = performance.now();
    td.moved   = false;
    td.lastDragX = t.clientX;
    td.lastDragY = t.clientY;
    td.lastDragMs = performance.now();
  }
  gActiveTouchCount = Object.keys(gTouches).length;
  if (gActiveTouchCount > maxFingers) maxFingers = gActiveTouchCount;

  // Record trail at touch start
  for (let id in gTouches) {
    const td = gTouches[id];
    recordTrailPoint(td.curX, td.curY);
  }

  // Clear inactivity timer on any touch
  clearTimeout(inactivityTimer);
  inactivityTimer = null;

  if (geoState === GeoState.IDLE) {
    transitionGeoState(GeoState.CHAOS);
  }

  if (DEBUG) console.log('[Geo] touchstart —', e.touches.length, 'finger(s)');
}

function geoOnTouchMove(e) {
  if (gActiveTouchCount === 0) return;
  e.preventDefault();

  for (let i = 0; i < e.touches.length; i++) {
    const t = e.touches[i];
    const td = getTouchData(t.identifier);
    td.curX = t.clientX;
    td.curY = t.clientY;

    const dx = t.clientX - td.startX;
    const dy = t.clientY - td.startY;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist > TAP_MAX_DIST) {
      td.moved = true;
      const pdx = t.clientX - td.lastDragX;
      const pdy = t.clientY - td.lastDragY;
      if (Math.abs(pdx) > 0.5 || Math.abs(pdy) > 0.5) {
        geoCx += pdx;
        geoCY += pdy;
        td.lastDragX = t.clientX;
        td.lastDragY = t.clientY;

        const now = performance.now();
        const dt = (now - td.lastDragMs) / 1000;
        if (dt > 0.001) {
          const speed = Math.sqrt(pdx * pdx + pdy * pdy) / dt;
          dragSpeeds.push(speed);
          if (dragSpeeds.length > 20) dragSpeeds.shift();
        }
        td.lastDragMs = now;

        gInputType = 'drag';
        gLastDragMs = now;
      }
    }
    // Track circle angles (for circle task)
    const adx = td.curX - td.startX;
    const ady = td.curY - td.startY;
    if (Math.sqrt(adx*adx + ady*ady) > 25) {
      circleAngles.push(Math.atan2(ady, adx));
      if (circleAngles.length > 30) circleAngles.shift();
    }
    // Record trail for visual feedback
    recordTrailPoint(td.curX, td.curY);
  }
}

function geoOnTouchEnd(e) {
  if (gActiveTouchCount === 0) return;
  e.preventDefault();

  let hadTap = false;
  let wasDrag = false;

  for (let i = 0; i < e.changedTouches.length; i++) {
    const ct = e.changedTouches[i];
    const td = gTouches[ct.identifier];
    if (!td) continue;

    const duration = performance.now() - td.startMs;
    const dx = td.curX - td.startX;
    const dy = td.curY - td.startY;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist <= TAP_MAX_DIST && duration < TAP_MAX_MS) {
      gInputType = 'tap';
      holdDuration = duration;
      recordTap(duration);
      hadTap = true;
    } else if (duration >= HOLD_MS && dist <= TAP_MAX_DIST) {
      gInputType = 'hold';
      holdDuration = duration;
    } else if (dist > TAP_MAX_DIST) {
      gInputType = 'drag';
      wasDrag = true;
      if (dy > 80 && Math.abs(dx) < Math.abs(dy) * 0.5 && duration < 500) {
        if (DEBUG) console.log('[Geo] Swipe down — reset');
        removeTouch(ct.identifier);
        resetGeometric();
        startInactivityTimer();
        return;
      }
    }

    removeTouch(ct.identifier);
  }

  if (hadTap || wasDrag) updateMetrics();
  checkTaskCircle();

  if (gActiveTouchCount === 0) {
    startInactivityTimer();
  }

  if (DEBUG && (hadTap || wasDrag)) console.log('[Geo] touchend —', gInputType, '| active:', gActiveTouchCount,
    '| state:', geoState, '| rhythm:', rhythmScore.toFixed(2), '| breaks:', breakCount,
    '| flow:', flowScore.toFixed(2), '| force:', forceScore.toFixed(2));
}

function geoOnTouchCancel(e) {
  gTouches = {};
  gActiveTouchCount = 0;
  startInactivityTimer();
}

// ── Mouse handlers (desktop dev) ──────
// ── Mouse state (separate from touch) ──
let gMouseActive  = false;
let gMouseStartX  = 0;
let gMouseStartY  = 0;
let gMouseCurX    = 0;
let gMouseCurY    = 0;
let gMouseStartMs = 0;
let gMouseDragX   = 0;
let gMouseDragY   = 0;
let gMouseDragMs  = 0;

function geoOnMouseDown(e) {
  if (state !== 'GEOMETRIC') return;
  gMouseActive = true;
  gMouseStartX = e.clientX;
  gMouseStartY = e.clientY;
  gMouseCurX   = e.clientX;
  gMouseCurY   = e.clientY;
  gMouseStartMs = performance.now();
  gMouseDragX  = e.clientX;
  gMouseDragY  = e.clientY;
  gMouseDragMs = performance.now();
  gInputType   = null;

  clearTimeout(inactivityTimer);
  inactivityTimer = null;

  if (geoState === GeoState.IDLE) {
    transitionGeoState(GeoState.CHAOS);
  }
}

function geoOnMouseMove(e) {
  if (!gMouseActive) return;
  const dx = e.clientX - gMouseStartX;
  const dy = e.clientY - gMouseStartY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist > TAP_MAX_DIST) {
    const pdx = e.clientX - gMouseDragX;
    const pdy = e.clientY - gMouseDragY;
    if (Math.abs(pdx) > 0.5 || Math.abs(pdy) > 0.5) {
      geoCx += pdx;
      geoCY += pdy;
      gMouseDragX = e.clientX;
      gMouseDragY = e.clientY;

      const now = performance.now();
      const dt = (now - gMouseDragMs) / 1000;
      if (dt > 0.001) {
        const speed = Math.sqrt(pdx * pdx + pdy * pdy) / dt;
        dragSpeeds.push(speed);
        if (dragSpeeds.length > 20) dragSpeeds.shift();
      }
      gMouseDragMs = now;
      gInputType = 'drag';
      gLastDragMs = now;
    }
  }
  gMouseCurX = e.clientX;
  gMouseCurY = e.clientY;
  // Record trail for mouse drag too
  recordTrailPoint(gMouseCurX, gMouseCurY);
}

function geoOnMouseUp(e) {
  if (!gMouseActive) return;
  const duration = performance.now() - gMouseStartMs;
  const dx = gMouseCurX - gMouseStartX;
  const dy = gMouseCurY - gMouseStartY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist <= TAP_MAX_DIST && duration < TAP_MAX_MS) {
    gInputType = 'tap';
    holdDuration = duration;
    recordTap(duration);
  } else if (duration >= HOLD_MS && dist <= TAP_MAX_DIST) {
    gInputType = 'hold';
    holdDuration = duration;
  } else if (dist > TAP_MAX_DIST) {
    gInputType = 'drag';
    if (dy > 80 && Math.abs(dx) < Math.abs(dy) * 0.5 && duration < 500) {
      if (DEBUG) console.log('[Geo] Swipe down (mouse) — reset');
      resetGeometric();
      return;
    }
  }

  updateMetrics();
  checkTaskCircle();
  gMouseActive = false;
  startInactivityTimer();

  if (DEBUG) console.log('[Geo] mouseup —', gInputType, '| state:', geoState,
    '| rhythm:', rhythmScore.toFixed(2), '| breaks:', breakCount,
    '| flow:', flowScore.toFixed(2), '| force:', forceScore.toFixed(2));
}

// ── Metrics ───────────────────────────
function recordTap(duration) {
  const now = performance.now();
  tapTimes.push(now);
  if (tapTimes.length > RHYTHM_WINDOW) tapTimes.shift();

  // Update force_score from tap
  // (tap doesn't have radius, keep last drag value or default)
  gInputType = 'tap';
}

function updateMetrics() {
  // rhythm_score: std dev of tap intervals (lower = more steady)
  if (tapTimes.length >= 2) {
    const intervals = [];
    for (let i = 1; i < tapTimes.length; i++) {
      intervals.push(tapTimes[i] - tapTimes[i - 1]);
    }
    const mean = intervals.reduce((a, b) => a + b, 0) / intervals.length;
    const variance = intervals.reduce((s, v) => s + (v - mean) ** 2, 0) / intervals.length;
    rhythmScore = Math.min(1, Math.sqrt(variance) / 500); // normalize: 500ms std = score 1
  }

  // flow_score: variance of drag speeds (lower = smoother)
  if (dragSpeeds.length >= 2) {
    const mean = dragSpeeds.reduce((a, b) => a + b, 0) / dragSpeeds.length;
    const variance = dragSpeeds.reduce((s, v) => s + (v - mean) ** 2, 0) / dragSpeeds.length;
    flowScore = Math.min(1, variance / 50000); // normalize
  }

  // force_score: gentle tap/speed = lower = better
  if (gInputType === 'drag' && dragSpeeds.length > 0) {
    const avgSpeed = dragSpeeds.reduce((a, b) => a + b, 0) / dragSpeeds.length;
    forceScore = Math.min(1, avgSpeed / 1000);
  } else if (gInputType === 'tap' && holdDuration > 10 && tapTimes.length >= 2) {
    // Real touch: longer gentler touch = lower force. 100ms → 0.24, 30ms → 0.8
    forceScore = Math.min(1, Math.max(0.05, 24 / holdDuration));
  } else if (gInputType === 'tap' && tapTimes.length >= 2) {
    // Desktop/mouse: use tap interval. 450ms calm → ~0.22, 200ms frantic → ~0.5
    const intervals = tapTimes.slice(-5);
    let sum = 0;
    for (let i = 1; i < intervals.length; i++) sum += intervals[i] - intervals[i - 1];
    const avgInt = sum / (intervals.length - 1);
    forceScore = Math.min(1, Math.max(0.05, 100 / avgInt));
  }

  // break_count: detect gaps (only after rhythm established + grace period)
  const nowForBreak = performance.now();
  if (gInputType === 'tap' && tapTimes.length >= 2 && (nowForBreak - geoStartMs) > BREAK_GRACE_MS) {
    clearTimeout(breakTimer);
    breakTimer = setTimeout(() => {
      // Only increment if enough time has passed since last tap
      const lastTap = tapTimes[tapTimes.length - 1];
      if (performance.now() - lastTap >= BREAK_MS) {
        breakCount++;
        if (DEBUG) console.log('[Break] FIRED — count:', breakCount, '| state:', geoState, '| lastTap:', Math.round(performance.now() - lastTap), 'ms ago');
        if (geoState === GeoState.PATTERN && breakCount >= 3) {
          transitionGeoState(GeoState.CHAOS);
        }
        if (geoState === GeoState.STABLE && breakCount >= 3) {
          transitionGeoState(GeoState.PATTERN);
        }
      }
    }, BREAK_MS);
  }

  // Track input type stability for N1
  if (gInputType && gInputType === lastInputType) {
    inputTypeMs += (performance.now() - (inputTypeMs > 0 ? inputTypeMs : performance.now()));
  } else {
    inputTypeMs = 0;
    lastInputType = gInputType;
  }
  inputTypeMs = gInputType === lastInputType ? inputTypeMs : 0;
  if (gInputType) lastInputType = gInputType;

  // Force score from touch radius (mobile)
  // We don't have radius from mouse events, so keep default for desktop

  // Task checks — after metrics are fresh
  checkTaskTap();
  checkTaskGentle();
  checkTaskDrag(maxFingers);

  evaluateNodes();
  evaluateStateTransitions();
}

// ── Node evaluation ───────────────────
function evaluateNodes() {
  const now = performance.now();

  // N1: "lopeta räpeltäminen" — steady rhythm, stable input type
  if (rhythmScore < RHYTHM_THRESH && gInputType && lastInputType === gInputType) {
    if (!n1Active) {
      n1StableSince = n1StableSince || now;
      if (now - n1StableSince > N1_STABLE_MS) {
        n1Active = true;
        if (DEBUG) console.log('[Node] N1 ACTIVE — rhythm stable');
        // Show hint label
        const pts = window.__triPts;
        if (pts) showNodeLabel(0, NODE_LABELS[0].text, pts[0].x, pts[0].y - 18);
      }
    }
  } else {
    if (n1Active && rhythmScore >= RHYTHM_THRESH) {
      n1Active = false;
      n1StableSince = 0;
      if (DEBUG) console.log('[Node] N1 lost');
      const pts = window.__triPts;
      if (pts) showNodeFail(0, 'rytmi', pts[0].x, pts[0].y - 16);
    }
    n1StableSince = 0;
  }

  // N2: "älä katkaise" — break_count == 0 for 5s
  if (breakCount === 0) {
    n2BreakSince = n2BreakSince || now;
    if (now - n2BreakSince > N2_ZERO_BREAK_MS) {
      if (!n2Active) {
        n2Active = true;
        if (DEBUG) console.log('[Node] N2 ACTIVE — no breaks');
        const pts = window.__triPts;
        const nodeMap = [];
        const n = pts ? pts.length : 0;
        if (n === 3) { nodeMap.push(1); }
        else { for(let j=Math.floor(n/3); j<Math.floor(2*n/3); j++) nodeMap.push(j); }
        const mid = nodeMap.length ? Math.floor(nodeMap.length/2) : 0;
        const idx25 = nodeMap[mid] || (pts ? 1 : 0);
        if (pts && pts[idx25]) showNodeLabel(1, NODE_LABELS[1].text, pts[idx25].x, pts[idx25].y - 18);
      }
    }
  } else {
    if (n2Active) {
      const pts = window.__triPts;
      const nodeMap = [];
      const n = pts ? pts.length : 0;
      if (n === 3) { nodeMap.push(1); }
      else { for(let j=Math.floor(n/3); j<Math.floor(2*n/3); j++) nodeMap.push(j); }
      const mid = nodeMap.length ? Math.floor(nodeMap.length/2) : 0;
      const idx = nodeMap[mid] || (pts ? 1 : 0);
      if (pts && pts[idx]) showNodeFail(1, 'tauko', pts[idx].x, pts[idx].y - 16);
    }
    n2Active = false;
    n2BreakSince = 0;
    if (DEBUG && n2Active) console.log('[Node] N2 lost — break');
  }

  // N3: "hellitä" — smooth flow, gentle force, steady rhythm (one finger drag)
  if (flowScore < FLOW_THRESH && forceScore < FORCE_LIMIT && rhythmScore < RHYTHM_THRESH) {
    if (!n3Active) {
      n3Active = true;
      if (DEBUG) console.log('[Node] N3 ACTIVE — not forcing');
      const pts = window.__triPts;
      if (pts) {
        const lastIdx = pts.length - 1;
        showNodeLabel(2, NODE_LABELS[2].text, pts[lastIdx].x, pts[lastIdx].y - 18);
      }
    }
  } else {
    if (n3Active) {
      n3Active = false;
      if (DEBUG) console.log('[Node] N3 lost');
      const pts = window.__triPts;
      if (pts) {
        const lastIdx = pts.length - 1;
        showNodeFail(2, 'liian kovaa', pts[lastIdx].x, pts[lastIdx].y - 16);
      }
    }
  }
}

// ── State transitions ─────────────────
function evaluateStateTransitions() {
  const now = performance.now();

  // CHAOS → PATTERN: rhythm recognized
  if (geoState === GeoState.CHAOS) {
    if (rhythmScore < RHYTHM_THRESH && tapTimes.length >= 3) {
      transitionGeoState(GeoState.PATTERN);
    }
  }

  // PATTERN → STABLE: no breaks for STABLE_TIME_MS
  if (geoState === GeoState.PATTERN) {
    if (breakCount === 0 && (now - geoStateMs) > STABLE_TIME_MS) {
      transitionGeoState(GeoState.STABLE);
    }
  }

  // STABLE → RESONANCE: all 3 nodes active
  if (geoState === GeoState.STABLE) {
    if (n1Active && n2Active && n3Active && allTasksDone()) {
      transitionGeoState(GeoState.RESONANCE);
    }
  }

  // RESONANCE → TRANSITION: short delay then unlock
  if (geoState === GeoState.RESONANCE) {
    if (now - geoStateMs > 500) {
      triggerUnlock();
    }
  }
}

function transitionGeoState(newState) {
  const oldState = geoState;
  geoState = newState;
  geoStateMs = performance.now();

  if (DEBUG) console.log('[State]', oldState, '→', newState);

  // Reset on state loss
  if (newState === GeoState.CHAOS) {
    // Don't clear everything, just reset break context
  }

  if (newState === GeoState.IDLE) {
    breakCount = 0;
    n1Active = false;
    n2Active = false;
    n3Active = false;
    tapTimes = [];
  }
}

// ── Inactivity ─────────────────────────
function startInactivityTimer() {
  clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(() => {
    if (geoState === GeoState.CHAOS && gActiveTouchCount === 0 && !gMouseActive) {
      if (DEBUG) console.log('[State] CHAOS → IDLE (inactivity)');
      transitionGeoState(GeoState.IDLE);
    }
  }, INACTIVITY_MS);
}

// ── Unlock trigger ────────────────────
// ── Dissolve animation ────────────────
let dissolveParticles = [];
let dissolveActive = false;
let dissolveStartMs = 0;
const DISSOLVE_DURATION = 1500;
const DISSOLVE_PARTICLE_COUNT = 120;

function triggerUnlock() {
  if (geoState !== GeoState.RESONANCE) return;
  transitionGeoState(GeoState.TRANSITION);

  if (DEBUG) console.log('[Unlock] RESONANCE → TRANSITION');

  // Haptic: try vibration, fallback to audio pulse
  if (navigator.vibrate) {
    navigator.vibrate([50, 30, 50]);
  } else if (audioCtx) {
    // iOS fallback: short 30Hz pulse
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 30;
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
  }

  // Shutdown audio layers
  shutdownAudioEngine();

  // 500ms delay (tension), then dissolve
  setTimeout(() => {
    startDissolve();
  }, 500);
}

function startDissolve() {
  dissolveActive = true;
  dissolveStartMs = performance.now();
  dissolveParticles = [];

  const pts = window.__triPts || getGeometryPoints().pts;
  const n = pts.length;

  // Generate particles from geometry edges
  for (let i = 0; i < DISSOLVE_PARTICLE_COUNT; i++) {
    let x, y;

    if (n <= 1) {
      // Void: particles from center
      x = pts[0].x + (Math.random() - 0.5) * 20;
      y = pts[0].y + (Math.random() - 0.5) * 20;
    } else {
      // Pick a random point on an edge
      const edge = Math.floor(Math.random() * n);
      const p1 = pts[edge];
      const p2 = pts[(edge + 1) % n];
      const t = Math.random();
      x = p1.x + (p2.x - p1.x) * t;
      y = p1.y + (p2.y - p1.y) * t;
    }

    // Add slight offset
    const ox = (Math.random() - 0.5) * 4;
    const oy = (Math.random() - 0.5) * 4;

    dissolveParticles.push({
      x: x + ox,
      y: y + oy,
      ox: x + ox,
      oy: y + oy,
      vx: (Math.random() - 0.5) * 250,
      vy: (Math.random() - 0.5) * 250,
      life: 0.6 + Math.random() * 0.4,
      size: 1 + Math.random() * 3,
      hue: 220 + Math.random() * 40
    });
  }

  if (DEBUG) console.log('[Dissolve] Started —', dissolveParticles.length, 'particles');
}

function updateDissolve(now) {
  if (!dissolveActive) return;

  const elapsed = now - dissolveStartMs;
  const progress = Math.min(elapsed / DISSOLVE_DURATION, 1);

  // Ease in-out
  const t = progress < 0.5
    ? 2 * progress * progress
    : -1 + (4 - 2 * progress) * progress;

  dissolveParticles.forEach(p => {
    // Phase 1 (0-0.6): spread outward
    // Phase 2 (0.6-1.0): converge to new shape (hexagon)
    if (progress < 0.6) {
      const phase1 = progress / 0.6;
      p.x = p.ox + p.vx * phase1;
      p.y = p.oy + p.vy * phase1;
    } else {
      // Converge to next level's geometry points
      const phase2 = (progress - 0.6) / 0.4;
      const nextLevel = (currentLevel % LEVEL_COUNT) + 1;
      const nextCfg = LevelGeom.config(nextLevel);
      const nextPts = [];
      const nextSides = nextCfg.sides;
      if (nextSides <= 1) {
        // Void: converge to center point
        const idx = dissolveParticles.indexOf(p);
        const angle = (Math.PI * 2 * idx) / dissolveParticles.length;
        const r = geoSize * 0.3 * (1 - phase2);
        nextPts.push({ x: geoCx + Math.cos(angle) * r, y: geoCY + Math.sin(angle) * r });
      }
      const idx = dissolveParticles.indexOf(p);
      const angle = (Math.PI * 2 * idx) / dissolveParticles.length;
      const targetR = nextSides <= 1 ? geoSize * 0.05 : geoSize * 0.8;
      const tx = geoCx + Math.cos(angle) * targetR * (0.5 + 0.5 * phase2);
      const ty = geoCY + Math.sin(angle) * targetR * (0.5 + 0.5 * phase2);

      p.x = p.x + (tx - p.x) * 0.08;
      p.y = p.y + (ty - p.y) * 0.08;
    }

    // Fade out over time
    p.alpha = 0.7 * (1 - progress * 0.5) * p.life;
    p.size = p.size * (1 - progress * 0.3);
  });

  if (progress >= 1) {
    finishDissolve();
  }
}

function drawDissolve() {
  if (!dissolveActive) return;

  dissolveParticles.forEach(p => {
    ctx.fillStyle = `rgba(${180 + Math.floor(Math.random()*40)},${180 + Math.floor(Math.random()*40)},${220 + Math.floor(Math.random()*35)},${p.alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.3, p.size), 0, Math.PI * 2);
    ctx.fill();
  });
}

function finishDissolve() {
  dissolveActive = false;
  dissolveParticles = [];

  // Advance to next level (cycle 1→2→3→4→1)
  currentLevel = (currentLevel % LEVEL_COUNT) + 1;
  const cfg = LevelGeom.config(currentLevel);

  if (DEBUG) console.log('[Dissolve] Complete → Level', currentLevel, cfg.name);

  // Brief pause for the new geometry to emerge, then re-enter
  setTimeout(() => {
    enterGeometricPhase();
  }, 250);
}

// ── Reset ─────────────────────────────
function resetGeometric() {
  geoState = GeoState.IDLE;
  geoStateMs = performance.now();
  geoCx = window.innerWidth / 2;
  geoCY = window.innerHeight / 2;
  rhythmScore = 1.0;
  holdDuration = 0;
  flowScore = 1.0;
  breakCount = 0;
  forceScore = 0.5;
  tapTimes = [];
  dragSpeeds = [];
  n1Active = false;
  n2Active = false;
  n3Active = false;
  n1StableSince = 0;
  n2BreakSince = 0;
  clearTimeout(breakTimer);
  clearTimeout(inactivityTimer);
  geoStartMs = performance.now();
  resetTasks();

  if (DEBUG) console.log('[Geo] Reset — IDLE');
}

// ── Enter geometric phase ─────────────
function enterGeometricPhase() {
  state = 'GEOMETRIC';
  initAudioEngine();
  resetGeometric();
  bindGeoEvents();
  setPhase('');

  const cfg = LevelGeom.config(currentLevel);
  geoRotation = 0;

  if (DEBUG) console.log('[State] Now GEOMETRIC — Level', currentLevel, cfg.name);

  // Start render loop
  if (!geoAnimFrame) {
    geoAnimFrame = requestAnimationFrame(geoRenderLoop);
  }
}

// ── Render loop ───────────────────────
function geoRenderLoop(now) {
  if (state !== 'GEOMETRIC') {
    geoAnimFrame = null;
    return;
  }
  geoAnimFrame = requestAnimationFrame(geoRenderLoop);

  updateAudioEngine();
  updateDissolve(now);
  evaluateStateTransitions();
  nodeGlowPhase += 0.03;
  updateTrailParticles(now);
  updateRhythmGuide(now);

  // State-aware background
  ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  ctx.fillStyle = getBackgroundColor();
  ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

  // Subtle ambient glow based on state + active nodes
  drawAmbientGlow();

  // Touch trail particles (before geometry)
  drawTrailParticles();

  if (dissolveActive) {
    drawDissolve();
  } else {
    // Update rotation for moving levels
    const cfg = LevelGeom.config(currentLevel);
    if (cfg.rotationSpeed > 0) {
      geoRotation += cfg.rotationSpeed * 16; // ~60fps delta
    }
    drawRhythmGuide();
    drawRhythmGuide();
    drawGeometry();
    drawNodes();
    drawNodeLabels();
    drawNodeFailLabels();
    drawLevelTasks();
  }
}

// ── Background effects ────────────────
function getBackgroundColor() {
  let r = 10, g = 10, b = 15;
  if (geoState === GeoState.CHAOS) {
    r = 18; g = 10; b = 12; // warm tension
  } else if (geoState === GeoState.PATTERN) {
    r = 11; g = 10; b = 14; // neutral
  } else if (geoState === GeoState.STABLE) {
    r = 10; g = 11; b = 17; // cool calm
  } else if (geoState === GeoState.RESONANCE) {
    r = 13; g = 13; b = 22; // bright climax
  }
  if (n3Active) { r += 1; b += 2; }
  return `rgb(${r},${g},${b})`;
}

function drawAmbientGlow() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const radius = Math.max(window.innerWidth, window.innerHeight) * 0.6;
  let alpha = 0, color = '180,180,220';

  if (geoState === GeoState.CHAOS) {
    alpha = 0.02; color = '200,150,150';
  } else if (geoState === GeoState.PATTERN) {
    alpha = 0.025; color = '180,180,220';
  } else if (geoState === GeoState.STABLE) {
    alpha = 0.04; color = '160,190,240';
  } else if (geoState === GeoState.RESONANCE) {
    alpha = 0.06 + Math.sin(nodeGlowPhase) * 0.02; color = '200,200,255';
  }
  if (n1Active) alpha += 0.005;
  if (n2Active) alpha += 0.01;
  if (n3Active) alpha += 0.015;

  if (alpha > 0) {
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    grad.addColorStop(0, `rgba(${color},${alpha})`);
    grad.addColorStop(1, `rgba(${color},0)`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
  }
}

// ── Touch trail particles ─────────────
let trailParticles = [];
const MAX_TRAIL = 60;

function recordTrailPoint(x, y) {
  const c = Math.min(1, Math.max(0, flowScore * 3)); // chaos from flow
  trailParticles.push({ x, y, age: 0, maxAge: 30 + Math.random() * 20, size: 1 + Math.random() * 2, chaos: c });
  if (trailParticles.length > MAX_TRAIL) trailParticles.shift();
}

function updateTrailParticles(now) {
  for (let i = trailParticles.length - 1; i >= 0; i--) {
    const p = trailParticles[i];
    p.age++;
    p.x += (Math.random() - 0.5) * p.chaos * 3;
    p.y += (Math.random() - 0.5) * p.chaos * 3;
    if (p.age > p.maxAge) trailParticles.splice(i, 1);
  }
}

function drawTrailParticles() {
  trailParticles.forEach(p => {
    const life = 1 - p.age / p.maxAge;
    const alpha = life * 0.3;
    const r = 160 + p.chaos * 60 | 0;
    const g = 180 - p.chaos * 60 | 0;
    const b = 220 - p.chaos * 80 | 0;
    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.3, p.size * life), 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawGeometry() {
  const { pts, cfg } = getGeometryPoints();
  if (pts.length < 2) return;

  // CHAOS wobble — geometry shakes when user is erratic
  const wobble = (geoState === GeoState.CHAOS) ? 4 + Math.sin(nodeGlowPhase * 8) * 2 : 0;
  const wobblePts = pts.map(p => ({
    x: p.x + (Math.random() - 0.5) * wobble,
    y: p.y + (Math.random() - 0.5) * wobble
  }));

  let lineAlpha = 0.12, lineWidth = 1;
  if (geoState === GeoState.STABLE || geoState === GeoState.RESONANCE) {
    lineAlpha = 0.35; lineWidth = 1.5;
  }
  if (n3Active) { lineAlpha = 0.6; lineWidth = 2; }
  if (geoState === GeoState.RESONANCE) {
    lineAlpha = 0.5 + Math.sin(nodeGlowPhase * 2) * 0.15;
  }

  ctx.strokeStyle = `rgba(180,180,220,${lineAlpha})`;
  ctx.lineWidth = lineWidth;
  ctx.beginPath();
  ctx.moveTo(wobblePts[0].x, wobblePts[0].y);
  for (let i = 1; i < wobblePts.length; i++) ctx.lineTo(wobblePts[i].x, wobblePts[i].y);
  ctx.closePath();
  ctx.stroke();
  window.__triPts = pts;
}

function drawNodes() {
  const pts = window.__triPts;
  if (!pts || pts.length === 0) return;

  const nodeRadius = 5;
  const isVoid = currentLevel === 4;
  const breath = 0.7 + 0.3 * Math.sin(nodeGlowPhase * 1.5);

  if (isVoid) { drawVoidNode(pts[0], nodeRadius); return; }

  // Map N1/N2/N3 to geometry nodes
  const nodeMap = [];
  const totalPts = pts.length;
  if (totalPts === 3) {
    nodeMap.push({ pts: [0], nodeId: 1 });
    nodeMap.push({ pts: [1], nodeId: 2 });
    nodeMap.push({ pts: [2], nodeId: 3 });
  } else {
    const perNode = Math.floor(totalPts / 3);
    for (let n = 0; n < 3; n++) {
      const indices = [];
      const start = n * perNode;
      const end = (n === 2) ? totalPts : (n + 1) * perNode;
      for (let i = start; i < end; i++) indices.push(i);
      nodeMap.push({ pts: indices, nodeId: n + 1 });
    }
  }

  nodeMap.forEach(({ pts: indices, nodeId }) => {
    const active = (nodeId === 1 && n1Active) || (nodeId === 2 && n2Active) || (nodeId === 3 && n3Active);
    let nodeAlpha = active ? 0.7 + (nodeId - 1) * 0.1 : 0.12;
    let glowAlpha = active ? 0.2 + (nodeId - 1) * 0.1 : 0;
    let radius = active ? nodeRadius * breath : nodeRadius;

    if (geoState === GeoState.RESONANCE) {
      glowAlpha = 0.4 + Math.sin(nodeGlowPhase * 3 + nodeId) * 0.3;
      nodeAlpha = 0.8 + Math.sin(nodeGlowPhase * 2 + nodeId) * 0.2;
      radius = nodeRadius * (0.8 + 0.4 * Math.sin(nodeGlowPhase * 2 + nodeId));
    }
    if (nodeId === 3 && n3Active && geoState !== GeoState.RESONANCE) {
      glowAlpha = 0.2 + Math.sin(nodeGlowPhase * 2) * 0.1;
    }

    indices.forEach(i => {
      if (i >= pts.length) return;
      const p = pts[i];
      if (glowAlpha > 0) {
        const glowR = radius * (2.5 + 1.5 * breath);
        const g = ctx.createRadialGradient(p.x, p.y, radius * 0.3, p.x, p.y, glowR);
        g.addColorStop(0, `rgba(200,200,255,${glowAlpha * breath})`);
        g.addColorStop(1, 'rgba(200,200,255,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(p.x, p.y, glowR, 0, Math.PI * 2);
        ctx.fill();
      }
      // Node dot
      ctx.fillStyle = `rgba(200,200,240,${nodeAlpha * breath})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx.fill();
      // Active nodes: bright inner core
      if (active) {
        ctx.fillStyle = `rgba(230,230,255,${0.5 * breath})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, radius * 0.4, 0, Math.PI * 2);
        ctx.fill();
      }
    });
  });
}

// ── Node hint labels ─────────────────
function drawNodeLabels() {
  const now = performance.now();
  nodeLabels.forEach((lbl, idx) => {
    if (!lbl.active) return;
    const elapsed = now - lbl.startMs;
    if (elapsed > LABEL_FADE_MS) { lbl.active = false; return; }

    // Fade: first 0.8s full, then gradual over rest
    const fade = elapsed < 800 ? 1 : 1 - (elapsed - 800) / (LABEL_FADE_MS - 800);
    const alpha = Math.max(0, fade);

    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';

    const fontSize = 16 + 8 * fade;
    ctx.font = `500 ${fontSize}px system-ui, -apple-system, sans-serif`;
    ctx.letterSpacing = '0.15em';

    // Measure text for background pill
    const metrics = ctx.measureText(lbl.text);
    const tw = metrics.width + 20;
    const th = fontSize + 8;

    // Dark background pill
    ctx.fillStyle = `rgba(5,5,10,${alpha * 0.7})`;
    ctx.beginPath();
    ctx.roundRect(lbl.x - tw/2, lbl.y - th + 2, tw, th, 4);
    ctx.fill();

    // Subtle border glow
    ctx.strokeStyle = `rgba(200,180,255,${alpha * 0.2})`;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.roundRect(lbl.x - tw/2, lbl.y - th + 2, tw, th, 4);
    ctx.stroke();

    // Cosmic gradient text — bright
    const grad = ctx.createLinearGradient(lbl.x - 40, lbl.y, lbl.x + 40, lbl.y);
    grad.addColorStop(0, `rgba(200,160,255,${alpha})`);
    grad.addColorStop(0.5, `rgba(180,220,255,${alpha})`);
    grad.addColorStop(1, `rgba(220,200,255,${alpha})`);

    // Glow
    ctx.shadowColor = `rgba(180,180,255,${alpha * 0.6})`;
    ctx.shadowBlur = 12;
    ctx.fillStyle = grad;
    ctx.fillText(lbl.text, lbl.x, lbl.y);
    ctx.restore();
  });
}

function drawNodeFailLabels() {
  const FAIL_FADE_MS = 2000;
  const now = performance.now();
  failLabels.forEach((lbl, idx) => {
    if (!lbl.active) return;
    const elapsed = now - lbl.startMs;
    if (elapsed > FAIL_FADE_MS) { lbl.active = false; return; }
    const fade = elapsed < 300 ? 1 : 1 - (elapsed - 300) / (FAIL_FADE_MS - 300);
    const alpha = Math.max(0, fade);

    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.font = `500 13px system-ui, -apple-system, sans-serif`;

    // Dark pill
    const tw = ctx.measureText(lbl.text).width + 16;
    ctx.fillStyle = `rgba(20,5,5,${alpha * 0.75})`;
    ctx.beginPath();
    ctx.roundRect(lbl.x - tw/2, lbl.y - 15 + 2, tw, 15, 3);
    ctx.fill();

    // Red border glow
    ctx.strokeStyle = `rgba(255,120,120,${alpha * 0.3})`;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.roundRect(lbl.x - tw/2, lbl.y - 15 + 2, tw, 15, 3);
    ctx.stroke();

    // Text — warm red
    ctx.shadowColor = `rgba(255,100,100,${alpha * 0.5})`;
    ctx.shadowBlur = 8;
    ctx.fillStyle = `rgba(255,160,160,${alpha})`;
    ctx.fillText(lbl.text, lbl.x, lbl.y);
    ctx.restore();
  });
}

// ── Level task list ───────────────────
function drawLevelTasks() {
  const tasks = currentTasks();
  const x = 12;
  let y = window.innerHeight - 14 - tasks.length * 18;
  const alpha = 0.4;

  ctx.save();
  tasks.forEach(t => {
    const done = tasksDone[t.id];
    const itemAlpha = done ? 0.6 : alpha;
    const color = done ? '180,220,180' : '180,180,200';
    const prefix = done ? '✓ ' : '○ ';

    ctx.fillStyle = `rgba(${color},${itemAlpha})`;
    ctx.font = '300 10px system-ui, -apple-system, sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(prefix + t.label, x, y);
    y += 18;
  });
  ctx.restore();
}

function drawVoidNode(pt, nodeRadius) {
  // All 3 resonance keys converge to the single point
  const activeCount = (n1Active ? 1 : 0) + (n2Active ? 1 : 0) + (n3Active ? 1 : 0);
  const allActive = n1Active && n2Active && n3Active;

  let nodeAlpha = 0.12 + activeCount * 0.2;
  let glowAlpha = activeCount * 0.08;
  let ringCount = activeCount;

  if (geoState === GeoState.RESONANCE || allActive) {
    glowAlpha = 0.3 + Math.sin(nodeGlowPhase * 2) * 0.2;
    nodeAlpha = 0.7 + Math.sin(nodeGlowPhase * 3) * 0.3;
    ringCount = 3;
  }

  // Concentric rings for each active resonance
  for (let r = 0; r < ringCount; r++) {
    const ringR = nodeRadius * (2 + r * 2.5);
    const ringAlpha = glowAlpha * (1 - r * 0.25);

    ctx.strokeStyle = `rgba(200,200,255,${ringAlpha})`;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, ringR, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Glow
  if (glowAlpha > 0) {
    const glow = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, nodeRadius * 6);
    glow.addColorStop(0, `rgba(200,200,255,${glowAlpha})`);
    glow.addColorStop(1, 'rgba(200,200,255,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, nodeRadius * 6, 0, Math.PI * 2);
    ctx.fill();
  }

  // Central dot
  ctx.fillStyle = `rgba(220,220,255,${nodeAlpha})`;
  ctx.beginPath();
  ctx.arc(pt.x, pt.y, nodeRadius * 1.3, 0, Math.PI * 2);
  ctx.fill();
}

// ── Event bindings ────────────────────
// Entry screen events (only active during IDLE entry phase)
entry.addEventListener('touchstart',  onTouchStart,  { passive: false });
entry.addEventListener('touchmove',   onTouchMove,   { passive: false });
entry.addEventListener('touchend',    onTouchEnd,    { passive: false });
entry.addEventListener('touchcancel', onTouchCancel, { passive: false });

// Mouse fallback for entry screen
entry.addEventListener('mousedown', (e) => {
  holdStart = performance.now();
  holdStartX = e.clientX;
  holdStartY = e.clientY;
  holdActive = true;
  holdCancelled = false;
  initAudio();

  clearTimeout(holdTimer);
  holdTimer = setTimeout(() => {
    if (!holdActive || holdCancelled) return;
    startTransition();
  }, HOLD_MS);

  if (DEBUG) console.log('[Input] mousedown — hold timer started');
});

window.addEventListener('mousemove', (e) => {
  if (!holdActive) return;
  const dx = e.clientX - holdStartX;
  const dy = e.clientY - holdStartY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > 10) {
    holdCancelled = true;
    clearTimeout(holdTimer);
    if (DEBUG) console.log('[Input] mousemove — hold cancelled (moved', Math.round(dist), 'px)');
  }
});

entry.addEventListener('mouseup', (e) => {
  holdActive = false;
  clearTimeout(holdTimer);
  const held = performance.now() - holdStart;
  if (DEBUG) console.log('[Input] mouseup — held', Math.round(held), 'ms');
});

entry.addEventListener('mouseleave', () => {
  holdActive = false;
  holdCancelled = true;
  clearTimeout(holdTimer);
});

// ── Init ──────────────────────────────
// Expose for debugging
window.__resonance = {
  getState: () => state,
  getGeoState: () => geoState,
  getMetrics: () => ({ rhythmScore, holdDuration, flowScore, breakCount, forceScore }),
  getNodes: () => ({ n1: n1Active, n2: n2Active, n3: n3Active }),
  getLevel: () => ({ level: currentLevel, name: LevelGeom.config(currentLevel).name }),
  // Debug: force unlock
  debugForceResonance: () => {
    n1Active = true; n2Active = true; n3Active = true;
    transitionGeoState(GeoState.RESONANCE);
  }
};

if (DEBUG) {
  console.log('══════════════════════════════════');
  console.log(' Resonance v0.1.0');
  console.log(' State: IDLE');
  console.log(' Hold threshold:', HOLD_MS, 'ms');
  console.log(' Levels:', LEVEL_COUNT, '(Triangle → Hexagon → Star → Void)');
  console.log('══════════════════════════════════');
}

setPhase('');
